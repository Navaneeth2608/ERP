version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: erp_web
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://erp_user:erp_password@db:5432/erp_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-development-key-that-is-at-least-32-chars-long-or-longer
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: erp_worker
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://erp_user:erp_password@db:5432/erp_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-development-key-that-is-at-least-32-chars-long-or-longer
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
